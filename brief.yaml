# Meridian Advisory — Brief for content generation
# Run: ensayo init --brief brief.yaml --output .

company:
  name: "Meridian Advisory"
  slug: "meridian-advisory"
  tagline: "Clarity in Complexity"
  industry: "managed_it"
  location: "Perth, Western Australia"

  profile:
    founded: 2014
    employees: 45
    revenue: "$12M annually"
    structure: "Partnership"
    description: |
      A boutique management consulting firm serving mid-market and
      government clients in Western Australia. Core practices in
      strategy, operations improvement, and digital transformation.
      Known for deep industry expertise in resources, government, and
      healthcare. The firm prides itself on senior partner involvement
      in every engagement — clients don't get handed to juniors.
    key_facts:
      - "4 partners, 12 senior consultants, 29 total staff"
      - "85% client retention rate"
      - "Average engagement length: 4-6 months"
      - "60% private sector, 40% government clients"
      - "Named WA Business News 'Emerging Professional Services Firm' 2023"
      - "Strong graduate program — 3 intake per year"
    services:
      - "Strategy development and planning"
      - "Operations improvement and process redesign"
      - "Digital transformation advisory"
      - "Change management"
      - "Government policy and program review"
      - "Organisational design"

  scenario:
    type: "growth"
    name: "The Partner Track Question"
    description: |
      Meridian has grown steadily through partner-led engagements, but
      the model is reaching its limits. The four partners are overcommitted
      and client work is starting to slip. The firm needs to decide
      whether to promote from within (creating a new partner tier from
      senior consultants), hire lateral partners from Big Four firms,
      or fundamentally restructure how engagements are staffed. Meanwhile,
      a state government department has approached Meridian about a
      large-scale digital transformation program that would be the
      firm's biggest engagement — but it would require dedicating a
      partner full-time for 18 months.
    key_tensions:
      - "Partner-led quality vs. scalability"
      - "Internal promotion vs. lateral hires — cultural fit risk"
      - "Government mega-deal vs. diverse client portfolio"
      - "Graduate development vs. immediate billable utilisation"
      - "Work-life balance at partner level — burnout risk"

